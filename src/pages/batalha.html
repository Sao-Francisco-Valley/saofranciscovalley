<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Catálogo — São Francisco Valley</title>
        <base id="site-base" href="/" />
        <script>
            (function () {
                var repoBase = '/saofranciscovalley/';
                var baseEl = document.getElementById('site-base');
                if (location.hostname.indexOf('github.io') !== -1 || location.pathname.indexOf(repoBase) === 0) {
                    baseEl.setAttribute('href', repoBase);
                } else {
                    baseEl.setAttribute('href', '/');
                }
            })();
        </script>
        <link rel="stylesheet" href="src/css/styles.css" />
    </head>
    <body>
        <div id="header"></div>

        <main id="app" class="app">
            <section class="section light">
                <div class="container">
                    <h1>1º Batalha de pitches da São Francisco Valley</h1>
                    <p>Faça a inscrição da sua startup para participar da primeira batalha de pitches da São Francisco Valley!</p>
                    <iframe src="src/assets/docs/Regras da 1º Battle Pitch Championship – São Francisco Valley.pdf" width="100%" height="500px"></iframe>
                    <a href="https://forms.gle/hqtJeFcBzZJGZz3C8" target="_blank" rel="noopener noreferrer"><button class="btn primary full-width" type="button">Inscrever-se</button></a>
                    <p class="small-text">As inscrições estão abertas até o dia 17/03/2026.</p>
                    <p class="small-text">Vagas limitadas!</p>
                </div>
            </section>

            <section class="section light">
                <div class="container">
                    <div class="batalha-container">
                    </div>
                </div>
            </section>
        </main>

        <div id="footer"></div>

        <script>
            ;(async function () {
                const header = await (await fetch('src/components/header.html')).text()
                document.getElementById('header').innerHTML = header
                const footer = await (await fetch('src/components/footer.html')).text()
                document.getElementById('footer').innerHTML = footer
            })()
        </script>
    </body>
</html>
